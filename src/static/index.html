<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Map Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a1a; color: #e0e0e0; }
        #map { width: 100%; height: 100vh; }
        .stats-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(10, 10, 26, 0.9); padding: 15px; border-radius: 8px;
            border: 1px solid #333; min-width: 250px;
        }
        .stats-panel h2 { color: #00ff88; font-size: 14px; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
        .stat-label { color: #888; }
        .stat-value { color: #00ff88; font-weight: bold; }
        .threat-feed {
            position: absolute; bottom: 10px; left: 10px; z-index: 1000;
            background: rgba(10, 10, 26, 0.9); padding: 10px; border-radius: 8px;
            border: 1px solid #333; max-height: 200px; overflow-y: auto; width: 350px;
        }
        .threat-item { padding: 5px; border-bottom: 1px solid #222; font-size: 12px; }
        .severity-critical { color: #ff0000; }
        .severity-high { color: #ff6600; }
        .severity-medium { color: #ffaa00; }
        .severity-low { color: #00aa00; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="stats-panel">
        <h2>THREAT MAP LIVE</h2>
        <div class="stat-row"><span class="stat-label">Total Attacks</span><span class="stat-value" id="total">0</span></div>
        <div class="stat-row"><span class="stat-label">Attacks/min</span><span class="stat-value" id="rate">0</span></div>
        <div class="stat-row"><span class="stat-label">Critical</span><span class="stat-value severity-critical" id="critical">0</span></div>
        <div class="stat-row"><span class="stat-label">High</span><span class="stat-value severity-high" id="high">0</span></div>
        <div class="stat-row"><span class="stat-label">Active Connections</span><span class="stat-value" id="connections">1</span></div>
    </div>
    <div class="threat-feed" id="feed"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script>
        const map = L.map('map', {
            center: [20, 0], zoom: 2, zoomControl: false,
            maxBounds: [[-85, -180], [85, 180]],
            minZoom: 2, maxZoom: 8,
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd', maxZoom: 19,
        }).addTo(map);

        let stats = { total: 0, critical: 0, high: 0, attacks: [] };
        const feed = document.getElementById('feed');

        function addThreat(threat) {
            stats.total++;
            if (threat.severity === 'critical') stats.critical++;
            if (threat.severity === 'high') stats.high++;

            document.getElementById('total').textContent = stats.total;
            document.getElementById('critical').textContent = stats.critical;
            document.getElementById('high').textContent = stats.high;

            if (threat.source && threat.destination) {
                const src = threat.source;
                const dst = threat.destination;
                const color = {critical:'#ff0000', high:'#ff6600', medium:'#ffaa00', low:'#00aa00'}[threat.severity] || '#ffffff';

                const srcMarker = L.circleMarker([src.lat, src.lon], {radius:4, color:color, fillColor:color, fillOpacity:0.8}).addTo(map);
                const dstMarker = L.circleMarker([dst.lat, dst.lon], {radius:4, color:color, fillColor:color, fillOpacity:0.8}).addTo(map);

                const line = L.polyline([[src.lat, src.lon], [dst.lat, dst.lon]], {color:color, weight:1.5, opacity:0.6, dashArray:'5,10'}).addTo(map);

                setTimeout(() => { map.removeLayer(line); map.removeLayer(srcMarker); map.removeLayer(dstMarker); }, 8000);
            }

            const item = document.createElement('div');
            item.className = 'threat-item';
            item.innerHTML = `<span class="severity-${threat.severity}">[${threat.severity.toUpperCase()}]</span> ${threat.type || 'Unknown'} - ${threat.source?.country || 'Unknown'} → ${threat.destination?.country || 'Unknown'}`;
            feed.insertBefore(item, feed.firstChild);
            while (feed.children.length > 20) feed.removeChild(feed.lastChild);
        }

        // Simulated local generation (no WebSocket needed)
        const attackTypes = ['DDoS','Brute Force','SQL Injection','XSS','Ransomware','Phishing','C2 Communication','Port Scan'];
        const countries = [{name:'United States',lat:39.8,lon:-98.5},{name:'China',lat:35.8,lon:104.2},{name:'Russia',lat:61.5,lon:105.3},{name:'Germany',lat:51.2,lon:10.4},{name:'Brazil',lat:-14.2,lon:-51.9},{name:'India',lat:20.6,lon:78.9},{name:'Japan',lat:36.2,lon:138.3},{name:'UK',lat:55.4,lon:-3.4},{name:'France',lat:46.2,lon:2.2},{name:'South Korea',lat:35.9,lon:127.8}];

        function generateThreat() {
            const src = countries[Math.floor(Math.random()*countries.length)];
            const dst = countries[Math.floor(Math.random()*countries.length)];
            return {
                type: attackTypes[Math.floor(Math.random()*attackTypes.length)],
                severity: ['low','medium','medium','high','high','critical'][Math.floor(Math.random()*6)],
                source: { country:src.name, lat:src.lat+Math.random()*4-2, lon:src.lon+Math.random()*4-2 },
                destination: { country:dst.name, lat:dst.lat+Math.random()*4-2, lon:dst.lon+Math.random()*4-2 },
            };
        }

        setInterval(() => addThreat(generateThreat()), 2000);
        setInterval(() => {
            const rate = Math.floor(Math.random()*30+10);
            document.getElementById('rate').textContent = rate;
        }, 5000);
    </script>
</body>
</html>
